function getFuelArm(fuelWeight, model) {
  const table = model.includes('S-76D') ? fuelArmD : fuelArmCP;
  
  // Find the two points to interpolate between
  for(let i=0; i<table.length-1; i++) {

      // Linear interpolation

    }

  if(fuelWeight > table[table.length-1][0]) return table[table.length-1][1];
  return table[0][1];
}

// 2D interpolation for HOGE weight
function getHOGEWeight(pressureAltitude, tempCelsius, model) {
  // Select correct table based on model
  let table;
  if (model.includes('S-76D')) {
    table = hogeTableD;
  } else if (model.includes('C++')) {
    table = hogeTableCPP;
  } else {
    // C+ models
    table = hogeTableCP;
  }
  
  // Get available altitudes (keys of table)
  const altitudes = Object.keys(table).map(Number).sort((a,b) => a-b);
  
  // Clamp pressure altitude to table range
  const alt = Math.max(altitudes[0], Math.min(altitudes[altitudes.length-1], pressureAltitude));
  
  // Find surrounding altitude points
  let altLower = altitudes[0];
  let altUpper = altitudes[altitudes.length-1];
  for (let i = 0; i < altitudes.length - 1; i++) {
    if (alt >= altitudes[i] && alt <= altitudes[i+1]) {
      altLower = altitudes[i];
      altUpper = altitudes[i+1];
      break;
    }
  }
  
  // Get temperature keys from table
  const temps = Object.keys(table[altLower]).map(Number).sort((a,b) => a-b);
  
  // Clamp temperature to table range
  const temp = Math.max(temps[0], Math.min(temps[temps.length-1], tempCelsius));
  
  // Find surrounding temperature points
  let tempLower = temps[0];
  let tempUpper = temps[temps.length-1];
  for (let i = 0; i < temps.length - 1; i++) {
    if (temp >= temps[i] && temp <= temps[i+1]) {
      tempLower = temps[i];
      tempUpper = temps[i+1];
      break;
    }
  }
  
  // Get the 4 corner values
  const w1 = table[altLower][tempLower];   // lower-left
  const w2 = table[altLower][tempUpper];   // lower-right
  const w3 = table[altUpper][tempLower];   // upper-left
  const w4 = table[altUpper][tempUpper];   // upper-right
  
  // Bilinear interpolation
  if (altUpper === altLower && tempUpper === tempLower) {
    return w1;
  } else if (altUpper === altLower) {
    // Interpolate only in temperature
    const t = (temp - tempLower) / (tempUpper - tempLower);
    return w1 + t * (w2 - w1);
  } else if (tempUpper === tempLower) {
    // Interpolate only in altitude
    const t = (alt - altLower) / (altUpper - altLower);
    return w1 + t * (w3 - w1);
  } else {
    // Full bilinear interpolation
    const tAlt = (alt - altLower) / (altUpper - altLower);
    const tTemp = (temp - tempLower) / (tempUpper - tempLower);
    const wLower = w1 + tTemp * (w2 - w1);
    const wUpper = w3 + tTemp * (w4 - w3);
    return wLower + tAlt * (wUpper - wLower);
  }
}

function calcPerf(totalWeight,model){
const c=state.fahrenheit!==''?Math.round((state.fahrenheit-32)*5/9):null;
const hp=(state.altimeter!==''&&state.fieldElevation!=='')?Math.round((29.92-parseFloat(state.altimeter))*1000+parseFloat(state.fieldElevation)):null;
const t5=state.tempAloft6000!==''?Math.round(parseFloat(state.tempAloft6000)+2):null;
function lookup(table,temp){if(temp===null)return null;const keys=Object.keys(table).map(Number).sort((a,b)=>a-b);if(temp<=-30)return table["-30"];let closest=keys[0];let minDiff=Math.abs(temp-closest);for(let k of keys){const diff=Math.abs(temp-k);if(diff<minDiff){minDiff=diff;closest=k}}return table[closest]}

else if(model.includes('C++')){meaWt=lookup(MEA_CPP,t5);v1=lookupV1(V1_CPP_TEMPS,V1_CPP,c,totalWeight)}

}

async function exportPDF(){

async function sendToOps(){
  if(pdfQueue.length===0)return;
  try{
    const files=pdfQueue.sort((a,b)=>a.leg-b.leg).map(i=>new File([i.blob],i.filename,{type:'application/pdf'}));
    if(navigator.share&&navigator.canShare&&navigator.canShare({files})){
      await navigator.share({files,title:'FXV Weight & Balance',text:'W&B — '+files.length+' leg(s)'});

    }

}



function fuelToMaxGross(c) {
  const zeroFuelWeight = c.totalWeight - state.fuel;
  const maxFuelPounds = c.maxGrossWeight - zeroFuelWeight;
  const maxFuelGallons = maxFuelPounds / 6.8;
  const fuelCapacity = c.heli.model.includes('S-76D') ? 286.0 : 281.2;
  const finalFuel = Math.min(Math.max(0, maxFuelPounds), fuelCapacity * 6.8);
  state.fuel = Math.round(finalFuel);
  render();
}

function fuelToHOGE(p, c) {
  if (!p.hogeWeight || p.hogeWeight === null) return;
  const zeroFuelWeight = c.totalWeight - state.fuel;
  const maxFuelPounds = p.hogeWeight - zeroFuelWeight;
  const fuelCapacity = c.heli.model.includes('S-76D') ? 286.0 : 281.2;
  const finalFuel = Math.min(Math.max(0, maxFuelPounds), fuelCapacity * 6.8);
  state.fuel = Math.round(finalFuel);
  render();
}

function fuelToMEA(p, c) {
  if (!p.meaWeight || p.meaWeight === null) return;
  const zeroFuelWeight = c.totalWeight - state.fuel;
  const maxFuelPounds = p.meaWeight - zeroFuelWeight;
  const fuelCapacity = c.heli.model.includes('S-76D') ? 286.0 : 281.2;
  const finalFuel = Math.min(Math.max(0, maxFuelPounds), fuelCapacity * 6.8);
  state.fuel = Math.round(finalFuel);
  render();
}
